apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-log4j-configmap
  namespace: dev
data:
  log4j.properties: |
    log4j.rootLogger=INFO, stdout
    log4j.appender.stdout=org.apache.log4j.ConsoleAppender
    log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
    log4j.appender.stdout.layout.ConversionPattern=[%d] %p %m (%c)%n

    log4j.appender.kafkaAppender=org.apache.log4j.RollingFileAppender
    log4j.appender.kafkaAppender.File=${kafka.logs.dir}/server.log
    log4j.appender.kafkaAppender.layout=org.apache.log4j.PatternLayout
    log4j.appender.kafkaAppender.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.appender.kafkaAppender.MaxFileSize=100MB
    log4j.appender.kafkaAppender.MaxBackupIndex=7

    log4j.appender.stateChangeAppender=org.apache.log4j.RollingFileAppender
    log4j.appender.stateChangeAppender.File=${kafka.logs.dir}/state-change.log
    log4j.appender.stateChangeAppender.layout=org.apache.log4j.PatternLayout
    log4j.appender.stateChangeAppender.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.appender.stateChangeAppender.MaxFileSize=100MB
    log4j.appender.stateChangeAppender.MaxBackupIndex=7

    log4j.appender.requestAppender=org.apache.log4j.RollingFileAppender
    log4j.appender.requestAppender.File=${kafka.logs.dir}/kafka-request.log
    log4j.appender.requestAppender.layout=org.apache.log4j.PatternLayout
    log4j.appender.requestAppender.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.appender.requestAppender.MaxFileSize=100MB
    log4j.appender.requestAppender.MaxBackupIndex=7

    log4j.appender.cleanerAppender=org.apache.log4j.RollingFileAppender
    log4j.appender.cleanerAppender.File=${kafka.logs.dir}/log-cleaner.log
    log4j.appender.cleanerAppender.layout=org.apache.log4j.PatternLayout
    log4j.appender.cleanerAppender.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.appender.cleanerAppender.MaxFileSize=100MB
    log4j.appender.cleanerAppender.MaxBackupIndex=7

    log4j.appender.controllerAppender=org.apache.log4j.RollingFileAppender
    log4j.appender.controllerAppender.File=${kafka.logs.dir}/controller.log
    log4j.appender.controllerAppender.layout=org.apache.log4j.PatternLayout
    log4j.appender.controllerAppender.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.appender.controllerAppender.MaxFileSize=100MB
    log4j.appender.controllerAppender.MaxBackupIndex=7

    log4j.appender.authorizerAppender=org.apache.log4j.RollingFileAppender
    log4j.appender.authorizerAppender.File=${kafka.logs.dir}/kafka-authorizer.log
    log4j.appender.authorizerAppender.layout=org.apache.log4j.PatternLayout
    log4j.appender.authorizerAppender.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.appender.authorizerAppender.MaxFileSize=100MB
    log4j.appender.authorizerAppender.MaxBackupIndex=7

    log4j.appender.applicationAppender=org.apache.log4j.RollingFileAppender
    log4j.appender.applicationAppender.File=${kafka.logs.dir}/kafka-application.log
    log4j.appender.applicationAppender.layout=org.apache.log4j.PatternLayout
    log4j.appender.applicationAppender.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.appender.applicationAppender.MaxFileSize=100MB
    log4j.appender.applicationAppender.MaxBackupIndex=7

    log4j.logger.kafka=INFO, kafkaAppender
    log4j.logger.kafka.network.RequestChannel$=WARN, requestAppender
    log4j.logger.kafka.request.logger=WARN, requestAppender
    log4j.logger.kafka.controller=TRACE, stateChangeAppender
    log4j.logger.state.change.logger=TRACE, stateChangeAppender
    log4j.logger.kafka.log.LogCleaner=INFO, cleanerAppender
    log4j.logger.kafka.server.BrokerServer=INFO, controllerAppender
    log4j.logger.kafka.server.ControllerServer=INFO, controllerAppender
    log4j.logger.kafka.authorizer.logger=INFO, authorizerAppender
    log4j.logger.org.apache.kafka=INFO, applicationAppender
    log4j.additivity.kafka=false
    log4j.additivity.kafka.network.RequestChannel$=false
    log4j.additivity.kafka.request.logger=false
    log4j.additivity.kafka.controller=false
    log4j.additivity.state.change.logger=false
    log4j.additivity.kafka.log.LogCleaner=false
    log4j.additivity.kafka.server.BrokerServer=false
    log4j.additivity.kafka.server.ControllerServer=false
    log4j.additivity.kafka.authorizer.logger=false
    log4j.additivity.org.apache.kafka=false
  kafka_server_jaas.conf: |
    KafkaServer {
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="kafkaadmin"
        password="kafkaadmin@123"
        user_kafkaadmin="kafkaadmin@123";
    };

    Client {
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="kafkaadmin"
        password="kafkaadmin@123";
    };
